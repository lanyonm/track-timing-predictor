name: Deploy to Production

# Prerequisite (one-time manual setup before this workflow can run):
#   1. aws iam create-open-id-connect-provider for token.actions.githubusercontent.com
#   2. cdk deploy TrackTimingBase TrackTimingStack-prod --context image_tag=prod-latest  (from CLI with human IAM user)
#   3. Add AWS_ACCOUNT_ID secret to the GitHub repo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/track-timing-github-actions
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: track-timing-predictor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:prod-latest \
            --push \
            .

      - name: Set up Python for CDK
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cdk/requirements.txt

      - name: Install CDK Python dependencies
        working-directory: cdk
        run: pip install -r requirements.txt

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy CDK stacks
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: us-east-1
        run: |
          cdk deploy TrackTimingBase TrackTimingStack-prod \
            --require-approval never \
            --context image_tag=${{ github.sha }}
