{% extends "base.html" %}
{% block title %}Track Timing Predictor{% endblock %}
{% block content %}
<section class="entry-form">
  <h2>Predict Event Start Times</h2>
  <p>Enter a <a href="https://tracktiming.live/" target="_blank">tracktiming.live</a> Event ID to see predicted start times for each event in the schedule.</p>
  <form onsubmit="event.preventDefault(); window.location='/schedule/' + document.getElementById('event_id').value">
    <label for="event_id">Event ID</label>
    <input
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      id="event_id"
      name="event_id"
      placeholder="e.g. 26008"
      required
    >
    <button type="submit">Load Schedule</button>
  </form>
  <p class="meta"><a href="/defaults">View default durations</a> &nbsp;·&nbsp; <a href="/learned">View learned durations</a></p>
</section>
{% endblock %}
